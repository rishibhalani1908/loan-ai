<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background: rgba(255,255,255,0.2);
    padding:30px;
    border-radius:15px;
    text-align:center;
    backdrop-filter: blur(10px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

input {
    margin:10px;
    padding:10px;
    width:200px;
    border:none;
    border-radius:5px;
}

button {
    padding:10px 20px;
    background:#ff4b2b;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#ff416c;
}
</style>

</head>

<body>

<div class="box">
<h2>🔐 AI Loan System</h2>

<form method="POST" action="/login">
<input name="username" placeholder="Username"><br>
<input name="password" placeholder="Password"><br>
<button>Login</button>
</form>

<hr>

<form method="POST" action="/register">
<input name="username" placeholder="New Username"><br>
<input name="password" placeholder="New Password"><br>
<button>Register</button>
</form>

</div>

</body>
</html>
